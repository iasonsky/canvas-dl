name: release

# Build standalone binaries for Windows/macOS/Linux and (optionally) publish to
# PyPI whenever a version tag is pushed, e.g. `git tag v0.2.0 && git push --tags`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: canvas-dl-linux
          - os: windows-latest
            artifact: canvas-dl-windows
          - os: macos-latest
            artifact: canvas-dl-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Hosted CPython bundles Tcl/Tk on Windows & macOS, but Ubuntu needs it
      # installed or the GUI binary crashes on launch.
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install project + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build CLI binary
        run: pyinstaller --noconfirm --clean canvas-dl-cli.spec

      - name: Build GUI binary
        run: pyinstaller --noconfirm --clean canvas-dl-gui.spec

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          chmod +x canvas-dl canvas-dl-gui/canvas-dl-gui || true
          tar -czf "../${{ matrix.artifact }}.tar.gz" canvas-dl canvas-dl-gui

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path canvas-dl.exe, canvas-dl-gui -DestinationPath "..\${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  github-release:
    name: Attach binaries to the GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI (trusted publishing)
    needs: build-binaries
    runs-on: ubuntu-latest
    # Disabled by default so the workflow stays green for binary-only releases.
    # To enable: (1) set up a "pypi" environment + a Trusted Publisher on PyPI
    # for this repo & workflow filename, then (2) add a repository variable
    # PUBLISH_TO_PYPI=true (Settings → Secrets and variables → Actions → Variables).
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/canvas-course-dl
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
